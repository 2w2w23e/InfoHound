defaults:
  timeout_seconds: 20
  max_links: 20
  same_domain_only: true
  crawl_type: html_list
  crawl:
    source_timeout_seconds: 180
  discovery:
    same_domain_only: true
    max_links: 20
  request:
    timeout_seconds: 20
    retries: 2
    retry_backoff_seconds: 1.0
    headers:
      Accept-Language: zh-CN,zh;q=0.9,en;q=0.8

sources:
  - slug: cn_mara_news
    name: 中国农业农村部信息公开
    base_url: https://www.moa.gov.cn
    category: policy
    language: zh
    country: CN
    crawl_type: html_list_strict
    timeout_seconds: 45
    max_links: 60
    same_domain_only: true
    entry_urls:
      - https://www.moa.gov.cn/xw/
    link_patterns:
      - /xw/
    exclude_patterns:
      - "javascript:"
      - /ztzl/
      - /xw/shipin/
      - /xw/tpxw
      - /nybgb/
      - /xw/index.htm
      - /xw/index.html
    notes: 中文农业政策核心来源；本轮收紧发现规则，优先过滤频道/目录/视频页，降低误抓。

  - slug: cn_caas_news
    name: 中国农业科学院新闻
    base_url: https://www.caas.cn
    category: research
    language: zh
    country: CN
    crawl_type: html_list
    timeout_seconds: 15
    max_links: 20
    same_domain_only: true
    entry_urls:
      - https://www.caas.cn/xwzx/
    link_patterns:
      - /xwzx/
    exclude_patterns:
      - "javascript:"

  - slug: china_agrisci
    name: 中国农业科学
    base_url: https://www.chinaagrisci.com
    category: research
    language: zh
    country: CN
    crawl_type: html_list
    is_active: false
    timeout_seconds: 60
    max_links: 50
    same_domain_only: true
    entry_urls:
      - https://www.chinaagrisci.com/CN/article/showTenArticle.do
    link_patterns:
      - /CN/10.3864/
    exclude_patterns:
      - download
      - showDownloadTopList
    notes: 当前环境入口持续 403，临时停用避免影响每日主流程；待网络可达后再恢复。

  - slug: agrirxiv_preprints
    name: agriRxiv
    base_url: https://agrirxiv.org
    category: research
    language: en
    country: GLOBAL
    crawl_type: rss
    is_active: false
    timeout_seconds: 30
    max_links: 50
    same_domain_only: true
    entry_urls:
      - https://agrirxiv.org/feed/
    exclude_patterns:
      - /category/
      - /feed
    notes: 农业预印本来源；当前环境下域名解析失败，先保留配置并暂不启用，待网络可达后再恢复。

  - slug: cimmyt_news
    name: CIMMYT News
    base_url: https://www.cimmyt.org
    category: research
    language: en
    country: GLOBAL
    crawl_type: html_list
    timeout_seconds: 20
    max_links: 20
    same_domain_only: true
    entry_urls:
      - https://www.cimmyt.org/news/
    link_patterns:
      - /news/
    exclude_patterns:
      - /tag/
      - /category/

  - slug: usda_press
    name: USDA Newsroom
    base_url: https://www.usda.gov
    category: policy
    language: en
    country: US
    crawl_type: html_list_strict
    timeout_seconds: 20
    max_links: 10
    same_domain_only: true
    entry_urls:
      - https://www.usda.gov/about-usda/general-information/staff-offices/office-chief-economist/newsroom
    link_patterns:
      - /about-usda/general-information/staff-offices/office-chief-economist/newsroom/
    exclude_patterns:
      - /es/
      - /topics/
      - /about-usda/news/
      - /about-usda/news/blog
      - /about-usda/news/press-releases
      - /media/press-releases/
    request:
      retries: 1
      headers:
        Accept-Language: en-US,en;q=0.9

  - slug: usda_ars_news
    name: USDA ARS Research News
    base_url: https://www.ars.usda.gov
    category: policy
    language: en
    country: US
    crawl_type: rss
    timeout_seconds: 30
    max_links: 30
    same_domain_only: true
    entry_urls:
      - https://www.ars.usda.gov/rss/?productName=Research+News
    link_patterns:
      - /news-events/news/research-news/
    exclude_patterns:
      - /rss/
    notes: 官方 RSS 源；优先作为英文政策/科研稳定输入。

  - slug: fao_newsroom
    name: FAO Newsroom
    base_url: https://www.fao.org
    category: policy
    language: en
    country: GLOBAL
    crawl_type: html_list_strict
    timeout_seconds: 25
    max_links: 25
    same_domain_only: true
    entry_urls:
      - https://www.fao.org/newsroom/en
    link_patterns:
      - /newsroom/detail/
    exclude_patterns:
      - /audio/

  - slug: agfundernews_global
    name: AgFunderNews
    base_url: https://agfundernews.com
    category: company_news
    language: en
    country: GLOBAL
    crawl_type: rss
    timeout_seconds: 30
    max_links: 50
    same_domain_only: true
    entry_urls:
      - https://agfundernews.com/feed
    exclude_patterns:
      - /feed
      - /feed/
      - ?output=feed
      - /category/
      - /tag/
      - /wp-content/
    notes: 全球农业科技创投高价值媒体；RSS 只做发现，继续屏蔽 feed 类脏链接。

  - slug: syngenta_media
    name: Syngenta Media Releases
    base_url: https://www.syngenta.com
    category: company_news
    language: en
    country: GLOBAL
    crawl_type: html_list_strict
    timeout_seconds: 20
    max_links: 20
    same_domain_only: true
    entry_urls:
      - https://www.syngenta.com/media/media-releases
    link_patterns:
      - /media/
    exclude_patterns:
      - /media-library/

  - slug: bayer_agriculture_news
    name: Bayer Crop Science News
    base_url: https://www.bayer.com
    category: company_news
    language: en
    country: GLOBAL
    crawl_type: html_list_strict
    timeout_seconds: 20
    max_links: 20
    same_domain_only: true
    entry_urls:
      - https://www.bayer.com/en/agriculture/news-stories
    link_patterns:
      - /en/agriculture/
    exclude_patterns:
      - /products/

  - slug: patents_placeholder
    name: Patent Source Placeholder
    base_url: https://patents.google.com
    category: patent
    language: en
    country: GLOBAL
    crawl_type: sitemap
    timeout_seconds: 25
    max_links: 20
    same_domain_only: true
    entry_urls:
      - https://patents.google.com/
    link_patterns:
      - /patent/
    exclude_patterns:
      - /advanced
    is_active: false
    notes: 占位来源；后续接 Lens.org 或 WIPO API connector 后再替换。
